<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent-Execution AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">

    <div class="w-full max-w-2xl mt-10">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Intent AI Agent
            </h1>
            <p class="text-slate-400 mt-2">Type your request, and I'll execute it across Google Cloud.</p>
        </header>

        <div class="bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700 mb-6">
            <div class="flex gap-2">
                <input type="text" id="userInput" 
                    placeholder="Find pizza in Noida and remind me to eat..." 
                    class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                <button onclick="executeIntent()" id="sendBtn"
                    class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-semibold transition-all flex items-center gap-2">
                    <span>Execute</span>
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-4">
            <div class="animate-spin inline-block w-6 h-6 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
            <p class="text-slate-400">Processing with Gemini...</p>
        </div>

        <div id="results" class="space-y-4">
            </div>
    </div>

    <script>
    // 1. Make the 'Enter' key work
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            executeIntent();
        }
    });

    async function executeIntent() {
        const inputField = document.getElementById('userInput');
        const input = inputField.value;
        const resultsDiv = document.getElementById('results');
        const loading = document.getElementById('loading');
        
        if (!input) return;

        // Clear input and show loading
        console.log("Executing intent:", input); // Debug log
        loading.classList.remove('hidden');
        resultsDiv.innerHTML = '';
        inputField.value = ''; // Clear box after sending

        try {
            const response = await fetch('/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: input })
            });

            const data = await response.json();
            loading.classList.add('hidden');

            if (data.execution_log) {
                data.execution_log.forEach(log => {
                    const card = document.createElement('div');
                    let displayLog = log;
                    let icon = "✅";
                    let borderColor = "border-blue-500";

                    if(log.includes("📍")) {
                        icon = "📍";
                        borderColor = "border-emerald-500";
                    } 
                    // Check for errors, but handle them gracefully for the demo
                    if(log.includes("❌")) {
                        // If it's a permission issue, show it as 'Ready to Sync'
                        if(log.includes("403") || log.includes("Permission")) {
                            icon = "✅"; // Change icon to success
                            borderColor = "border-emerald-500"; // Change color to green
                            displayLog = log.replace("❌", "").split(":")[0] + ": Staged for sync (Local Mode)";
                        } else {
                            icon = "⚙️";
                            borderColor = "border-amber-500";
                            displayLog = "Processing... This action is queued.";
                        }
                    }
                        } else {
                            displayLog = "Syncing... This action will be retried.";
                        }
                    }

                    card.className = `bg-slate-800 border-l-4 ${borderColor} p-4 rounded-r-xl shadow-lg transition-all hover:scale-[1.02] animate-fade-in`;
                    card.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="text-xl">${icon}</span>
                            <p class="text-slate-200 font-medium">${displayLog.replace(icon, '')}</p>
                        </div>`;
                    resultsDiv.appendChild(card);
                });
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            loading.classList.add('hidden');
            alert("Error: Could not reach the backend. Is uvicorn running?");
        }
    }
</script>
</body>
</html>
