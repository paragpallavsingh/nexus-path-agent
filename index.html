<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent-Execution AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">

    <div class="w-full max-w-2xl mt-10">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Intent AI Agent
            </h1>
            <p class="text-slate-400 mt-2">Type your request, and I'll execute it across Google Cloud.</p>
        </header>

        <div class="bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700 mb-6">
            <div class="flex gap-2">
                <input type="text" id="userInput" 
                    placeholder="Find pizza in Noida and remind me to eat..." 
                    class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                <button onclick="executeIntent()" id="sendBtn"
                    class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-semibold transition-all flex items-center gap-2">
                    <span>Execute</span>
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-4">
            <div class="animate-spin inline-block w-6 h-6 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
            <p class="text-slate-400">Processing with Gemini...</p>
        </div>

        <div id="results" class="space-y-4">
            </div>
    </div>

    <script>
        async function executeIntent() {
            const input = document.getElementById('userInput').value;
            const resultsDiv = document.getElementById('results');
            const loading = document.getElementById('loading');
            
            if (!input) return;

            loading.classList.remove('hidden');
            resultsDiv.innerHTML = '';

            try {
                const response = await fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: input })
                });

                const data = await response.json();
                loading.classList.add('hidden');

                if (data.execution_log) {
                    data.execution_log.forEach(log => {
                        const card = document.createElement('div');
                        card.className = "bg-slate-800 border-l-4 border-blue-500 p-4 rounded-r-xl shadow-lg animate-fade-in";
                        
                        // Icon Logic
                        let icon = "✅";
                        if(log.includes("📍")) icon = "📍";
                        if(log.includes("📅")) icon = "📅";
                        if(log.includes("❌")) {
                            icon = "⚠️";
                            card.className = "bg-slate-800 border-l-4 border-red-500 p-4 rounded-r-xl opacity-80";
                        }

                        card.innerHTML = `<div class="flex items-center gap-3">
                            <span class="text-xl">${icon}</span>
                            <p class="text-slate-200">${log.replace(icon, '')}</p>
                        </div>`;
                        resultsDiv.appendChild(card);
                    });
                }
            } catch (error) {
                loading.classList.add('hidden');
                alert("Error connecting to backend!");
            }
        }
    </script>
</body>
</html>
